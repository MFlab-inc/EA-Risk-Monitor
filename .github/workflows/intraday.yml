name: Intraday Risk Update

on:
  schedule:
    # 毎時5分・35分(全日)。GitHubのcron遅延・間引きに耐えるため毎時2回設定
    # (半分間引かれても実質毎時1回)。市場時間判定はスクリプト側で行い、時間外は即終了。
    # 実行分は既存FXDaily-Levels(:13/:43)とずらしてレート制限8クレジット/分の衝突を回避。
    - cron: "5,35 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  intraday:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run intraday batch
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/intraday.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/risk-feed.json
          git diff --cached --quiet || git commit -m "intraday: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push || (git pull --rebase -X theirs origin main && git push)
