name: Intraday Risk Update

on:
  schedule:
    # 毎時35分(全日)。市場時間判定(NY基準 日曜17:00〜金曜17:00)はスクリプト側で行い、
    # 時間外は即終了する。GitHub Actionsのcronは数分〜数十分遅延し得る点に留意。
    # 実行分(:35)は既存FXDaily-Levels(:13/:43)とずらしてレート制限8クレジット/分の衝突を回避。
    - cron: "35 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  intraday:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run intraday batch
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/intraday.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/risk-feed.json
          git diff --cached --quiet || git commit -m "intraday: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
